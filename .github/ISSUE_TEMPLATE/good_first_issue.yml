name: 🌱 Good First Issue
description: A well-scoped task for first-time contributors — no deep system knowledge required
labels: ["good first issue"]
body:
  - type: markdown
    attributes:
      value: |
        This issue is designed for new contributors. It has a small, clear scope and won't require deep knowledge of the codebase.

        **Before starting:** Read [CONTRIBUTING.md](../CONTRIBUTING.md) and comment below to claim this issue.

  - type: textarea
    id: task
    attributes:
      label: Task Description
      description: What needs to be done?
      placeholder: Describe the specific, well-scoped task...
    validations:
      required: true

  - type: textarea
    id: files
    attributes:
      label: Files or Area Involved
      description: Which file(s) or component(s) does this touch?
      placeholder: "e.g. frontend/src/components/JobCard.jsx"
    validations:
      required: false

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: How do we know this is done?
      placeholder: |
        - [ ] X is changed
        - [ ] Y still passes
        - [ ] No regressions in related tests
    validations:
      required: true

  - type: checkboxes
    id: contributor_checklist
    attributes:
      label: Contributor Checklist
      options:
        - label: I have read CONTRIBUTING.md
        - label: I understand the task and acceptance criteria
        - label: I will comment to claim before starting work

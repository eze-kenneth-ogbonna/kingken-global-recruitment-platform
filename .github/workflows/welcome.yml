name: Welcome New Contributors

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    name: Welcome first-time contributor
    runs-on: ubuntu-latest
    steps:
      - name: Welcome on first issue
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const sender = context.payload.sender.login;

            // Check if this user has opened issues before
            const issues = await github.rest.issues.listForRepo({
              owner, repo,
              creator: sender,
              state: 'all',
              per_page: 2
            });

            // Only welcome if this is their very first issue
            if (issues.data.length <= 1) {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: context.issue.number,
                body: `👋 Welcome to KingKen Global, @${sender}!\n\nThanks for opening your first issue. Here's what happens next:\n\n- A maintainer will review and triage this shortly.\n- If you'd like to work on a fix yourself, comment here to claim it and we'll assign it to you.\n- Check out [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md) for setup instructions.\n\nWe appreciate you taking the time to contribute! 🚀`
              });
            }

      - name: Welcome on first pull request
        if: github.event_name == 'pull_request_target'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const sender = context.payload.sender.login;

            // Check if this user has opened PRs before
            const prs = await github.rest.pulls.list({
              owner, repo,
              state: 'all',
              per_page: 100
            });

            const userPRs = prs.data.filter(pr => pr.user.login === sender);

            // Only welcome if this is their first PR
            if (userPRs.length <= 1) {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: context.payload.pull_request.number,
                body: `🎉 Congrats on your first pull request to KingKen Global, @${sender}!\n\nA maintainer will review this soon. While you wait:\n\n- Make sure CI checks pass (look for the green checkmark)\n- Double-check [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md) for any checklist items\n- Feel free to comment if you have questions\n\nThanks for contributing — you're awesome! 🙌`
              });
            }

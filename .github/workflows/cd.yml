name: CD

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: cd-main
  cancel-in-progress: true

jobs:
  build-and-push-images:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    outputs:
      backend_image: ${{ steps.meta.outputs.backend_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Debug environment
        run: |
          echo "Branch: $GITHUB_REF"
          echo "SHA: $GITHUB_SHA"
          echo "Actor: $GITHUB_ACTOR"
          echo ""
          echo "=== Repository structure ==="
          ls -la
          echo ""
          echo "=== Backend structure ==="
          ls -la backend/
          echo ""
          echo "=== Frontend structure ==="
          ls -la frontend/
          echo ""
          echo "=== Backend src ==="
          ls -la backend/src/
          echo ""
          echo "=== Backend files ==="
          find backend -name "Dockerfile" -o -name "package.json" -o -name "tsconfig.json" | head -20

      - name: Derive image metadata
        id: meta
        run: |
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          echo "backend_image=ghcr.io/${OWNER_LC}/kingken-backend:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=ghcr.io/${OWNER_LC}/kingken-frontend:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "backend_latest=ghcr.io/${OWNER_LC}/kingken-backend:latest" >> "$GITHUB_OUTPUT"
          echo "frontend_latest=ghcr.io/${OWNER_LC}/kingken-frontend:latest" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Docker Build Cache
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_image }}
            ${{ steps.meta.outputs.backend_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.meta.outputs.frontend_image }}
            ${{ steps.meta.outputs.frontend_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-vps:
    name: Deploy to VPS
    needs: build-and-push-images
    runs-on: ubuntu-latest

    steps:
      - name: Validate deployment secrets
        id: precheck
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [ -n "${VPS_HOST}" ] && [ -n "${VPS_USER}" ] && [ -n "${VPS_SSH_KEY}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ Deploy skipped: missing one or more required secrets (VPS_HOST, VPS_USER, VPS_SSH_KEY)." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Checkout
        if: ${{ steps.precheck.outputs.ready == 'true' }}
        uses: actions/checkout@v5

      - name: Upload compose file to VPS
        if: ${{ steps.precheck.outputs.ready == 'true' }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: ops/docker-compose.prod.yml
          target: ~/kingken/
          strip_components: 1

      - name: Deploy via SSH
        if: ${{ steps.precheck.outputs.ready == 'true' }}
        uses: appleboy/ssh-action@v1.0.3
        env:
          BACKEND_IMAGE: ${{ needs.build-and-push-images.outputs.backend_image }}
          FRONTEND_IMAGE: ${{ needs.build-and-push-images.outputs.frontend_image }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: BACKEND_IMAGE,FRONTEND_IMAGE,GHCR_USER,GHCR_TOKEN,DATABASE_URL,JWT_SECRET,MAIL_FROM,APP_BASE_URL,SMTP_HOST,SMTP_PORT,SMTP_SECURE,SMTP_USER,SMTP_PASS
          script: |
            set -euo pipefail
            mkdir -p ~/kingken
            cd ~/kingken

            printf '%s\n' \
              "BACKEND_IMAGE=${BACKEND_IMAGE}" \
              "FRONTEND_IMAGE=${FRONTEND_IMAGE}" \
              "DATABASE_URL=${DATABASE_URL}" \
              "JWT_SECRET=${JWT_SECRET}" \
              "MAIL_FROM=${MAIL_FROM}" \
              "APP_BASE_URL=${APP_BASE_URL}" \
              "SMTP_HOST=${SMTP_HOST}" \
              "SMTP_PORT=${SMTP_PORT}" \
              "SMTP_SECURE=${SMTP_SECURE}" \
              "SMTP_USER=${SMTP_USER}" \
              "SMTP_PASS=${SMTP_PASS}" \
              > .env.deploy

            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin

            docker compose -f docker-compose.prod.yml --env-file .env.deploy pull
            docker compose -f docker-compose.prod.yml --env-file .env.deploy up -d --wait backend
            docker compose -f docker-compose.prod.yml --env-file .env.deploy up -d --wait frontend

            docker compose -f docker-compose.prod.yml --env-file .env.deploy ps
            docker image prune -f

      - name: Verify deployment
        if: ${{ steps.precheck.outputs.ready == 'true' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sleep 10
            if curl -f http://localhost/health; then
              echo "Health check passed"
            else
              echo "❌ Health check failed — rolling back"
              cd ~/kingken
              docker compose -f docker-compose.prod.yml --env-file .env.deploy down
              docker compose -f docker-compose.prod.yml --env-file .env.deploy up -d
              exit 1
            fi

      - name: Notify on deploy failure
        if: ${{ failure() && steps.precheck.outputs.ready == 'true' }}
        env:
          SHA: ${{ github.sha }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          echo "🚨 Deployment failed for commit ${SHA} on host ${VPS_HOST}" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${SLACK_WEBHOOK_URL}" ]; then
            payload=$(printf '{"text":"🚨 KingKen deploy failed for `%s` on `%s`"}' "${SHA}" "${VPS_HOST}")
            curl -sS -X POST -H 'Content-type: application/json' --data "${payload}" "${SLACK_WEBHOOK_URL}" >/dev/null
          fi

      - name: Notify on deploy success
        if: ${{ success() && steps.precheck.outputs.ready == 'true' }}
        env:
          SHA: ${{ github.sha }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          echo "✅ Deployment succeeded for commit ${SHA} on host ${VPS_HOST}" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${SLACK_WEBHOOK_URL}" ]; then
            payload=$(printf '{"text":"✅ KingKen deploy succeeded for `%s` on `%s`"}' "${SHA}" "${VPS_HOST}")
            curl -sS -X POST -H 'Content-type: application/json' --data "${payload}" "${SLACK_WEBHOOK_URL}" >/dev/null
          fi

name: CD

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: cd-main
  cancel-in-progress: true

jobs:
  build-and-push-images:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    outputs:
      backend_image: ${{ steps.meta.outputs.backend_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}
      release_tag: ${{ steps.meta.outputs.release_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Debug environment
        run: |
          echo "Branch: $GITHUB_REF"
          echo "SHA: $GITHUB_SHA"
          echo "Actor: $GITHUB_ACTOR"
          echo ""
          echo "=== Repository structure ==="
          ls -la
          echo ""
          echo "=== Backend structure ==="
          ls -la backend/
          echo ""
          echo "=== Frontend structure ==="
          ls -la frontend/
          echo ""
          echo "=== Backend src ==="
          ls -la backend/src/
          echo ""
          echo "=== Backend files ==="
          find backend -name "Dockerfile" -o -name "package.json" -o -name "tsconfig.json" | head -20

      - name: Derive image metadata
        id: meta
        run: |
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          RELEASE_TAG="$(git tag --points-at "$GITHUB_SHA" | head -n 1 || true)"
          if [ -z "${RELEASE_TAG}" ]; then
            RELEASE_TAG="none"
          fi
          echo "backend_image=ghcr.io/${OWNER_LC}/kingken-backend:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=ghcr.io/${OWNER_LC}/kingken-frontend:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "backend_latest=ghcr.io/${OWNER_LC}/kingken-backend:latest" >> "$GITHUB_OUTPUT"
          echo "frontend_latest=ghcr.io/${OWNER_LC}/kingken-frontend:latest" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Record build plan summary
        run: |
          {
            echo "## Build plan"
            echo ""
            echo "- Commit: ${GITHUB_SHA}"
            echo "- Release tag: ${{ steps.meta.outputs.release_tag }}"
            echo "- Backend image: ${{ steps.meta.outputs.backend_image }}"
            echo "- Frontend image: ${{ steps.meta.outputs.frontend_image }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Docker Build Cache
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Preflight backend build validation
        working-directory: backend
        run: |
          set -euo pipefail
          echo "::group::CD preflight backend build"
          npm ci --no-audit --no-fund
          npx prisma generate --schema prisma/schema.prisma
          if ! npm run build; then
            echo "::error title=CD Preflight Failed (Backend)::backend/npm run build failed before Docker build. Check TypeScript and Prisma compatibility."
            exit 1
          fi
          echo "::notice title=CD Preflight Passed (Backend)::Backend build is healthy for Docker image build."
          echo "::endgroup::"

      - name: Preflight frontend build validation
        working-directory: frontend
        run: |
          set -euo pipefail
          echo "::group::CD preflight frontend build"
          npm ci --no-audit --no-fund
          if ! npm run build; then
            echo "::error title=CD Preflight Failed (Frontend)::frontend/npm run build failed before Docker build. Check Vite and dependency compatibility."
            exit 1
          fi
          echo "::notice title=CD Preflight Passed (Frontend)::Frontend build is healthy for Docker image build."
          echo "::endgroup::"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_image }}
            ${{ steps.meta.outputs.backend_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.meta.outputs.frontend_image }}
            ${{ steps.meta.outputs.frontend_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-vps:
    name: Deploy to VPS
    needs: build-and-push-images
    runs-on: ubuntu-latest

    steps:
      - name: Validate deployment secrets
        id: precheck
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [ -n "${VPS_HOST}" ] && [ -n "${VPS_USER}" ] && [ -n "${VPS_SSH_KEY}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ Deploy skipped: missing one or more required secrets (VPS_HOST, VPS_USER, VPS_SSH_KEY)." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Record deployment target summary
        if: ${{ steps.precheck.outputs.ready == 'true' }}
        run: |
          {
            echo "## Deployment target"
            echo ""
            echo "- Host: ${{ secrets.VPS_HOST }}"
            echo "- Release tag: ${{ needs.build-and-push-images.outputs.release_tag }}"
            echo "- Backend image: ${{ needs.build-and-push-images.outputs.backend_image }}"
            echo "- Frontend image: ${{ needs.build-and-push-images.outputs.frontend_image }}"
            echo "- Strategy: health-checked deploy with rollback to previous running images"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Record deploy start time
        if: ${{ steps.precheck.outputs.ready == 'true' }}
        id: deploy_start
        run: echo "epoch=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: ${{ steps.precheck.outputs.ready == 'true' }}
        uses: actions/checkout@v5

      - name: Upload compose file to VPS
        if: ${{ steps.precheck.outputs.ready == 'true' }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: ops/docker-compose.prod.yml
          target: ~/kingken/
          strip_components: 1

      - name: Deploy and verify with rollback via SSH
        if: ${{ steps.precheck.outputs.ready == 'true' }}
        id: remote_deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          BACKEND_IMAGE: ${{ needs.build-and-push-images.outputs.backend_image }}
          FRONTEND_IMAGE: ${{ needs.build-and-push-images.outputs.frontend_image }}
          RELEASE_TAG: ${{ needs.build-and-push-images.outputs.release_tag }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          REPOSITORY: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          capture_stdout: true
          envs: BACKEND_IMAGE,FRONTEND_IMAGE,RELEASE_TAG,RUN_ID,RUN_ATTEMPT,REPOSITORY,ACTOR,RUN_URL,GHCR_USER,GHCR_TOKEN,DATABASE_URL,JWT_SECRET,MAIL_FROM,APP_BASE_URL,SMTP_HOST,SMTP_PORT,SMTP_SECURE,SMTP_USER,SMTP_PASS
          script: |
            set -uo pipefail
            mkdir -p ~/kingken
            cd ~/kingken

            DEPLOY_STATUS="success"
            ROLLBACK_STATUS="not_needed"
            FAILURE_REASON="none"
            DEPLOY_STARTED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

            HISTORY_DIR="$PWD/deploy-history"
            DEPLOY_HISTORY_FILE="$HISTORY_DIR/deployments.log"
            ROLLBACK_AUDIT_FILE="$HISTORY_DIR/rollback-audit.log"
            mkdir -p "$HISTORY_DIR"

            PREV_BACKEND_IMAGE="$(docker inspect --format='{{.Config.Image}}' kingken-backend 2>/dev/null || true)"
            PREV_FRONTEND_IMAGE="$(docker inspect --format='{{.Config.Image}}' kingken-frontend 2>/dev/null || true)"

            printf '%s\n' \
              "PREV_BACKEND_IMAGE=${PREV_BACKEND_IMAGE}" \
              "PREV_FRONTEND_IMAGE=${PREV_FRONTEND_IMAGE}" \
              > .env.rollback.images

            printf '%s\n' \
              "BACKEND_IMAGE=${BACKEND_IMAGE}" \
              "FRONTEND_IMAGE=${FRONTEND_IMAGE}" \
              "DATABASE_URL=${DATABASE_URL}" \
              "JWT_SECRET=${JWT_SECRET}" \
              "MAIL_FROM=${MAIL_FROM}" \
              "APP_BASE_URL=${APP_BASE_URL}" \
              "SMTP_HOST=${SMTP_HOST}" \
              "SMTP_PORT=${SMTP_PORT}" \
              "SMTP_SECURE=${SMTP_SECURE}" \
              "SMTP_USER=${SMTP_USER}" \
              "SMTP_PASS=${SMTP_PASS}" \
              > .env.deploy

            if ! echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin; then
              DEPLOY_STATUS="failed"
              FAILURE_REASON="ghcr_login_failed"
            fi

            if [ "${DEPLOY_STATUS}" = "success" ] && ! docker compose -f docker-compose.prod.yml --env-file .env.deploy pull; then
              DEPLOY_STATUS="failed"
              FAILURE_REASON="compose_pull_failed"
            fi

            if [ "${DEPLOY_STATUS}" = "success" ] && ! docker compose -f docker-compose.prod.yml --env-file .env.deploy up -d --wait backend; then
              DEPLOY_STATUS="failed"
              FAILURE_REASON="backend_deploy_failed"
            fi

            if [ "${DEPLOY_STATUS}" = "success" ] && ! docker compose -f docker-compose.prod.yml --env-file .env.deploy up -d --wait frontend; then
              DEPLOY_STATUS="failed"
              FAILURE_REASON="frontend_deploy_failed"
            fi

            if [ "${DEPLOY_STATUS}" = "success" ] && curl -fsS http://localhost/health >/dev/null && curl -fsS http://localhost/ >/dev/null; then
              echo "Deployment health checks passed"
              docker compose -f docker-compose.prod.yml --env-file .env.deploy ps
              docker image prune -f
            else
              if [ "${FAILURE_REASON}" = "none" ]; then
                FAILURE_REASON="post_deploy_healthcheck_failed"
              fi
              DEPLOY_STATUS="failed"
            fi

            if [ "${DEPLOY_STATUS}" != "success" ]; then
              echo "Deployment failed. Attempting rollback to previous images..."

              if [ -z "${PREV_BACKEND_IMAGE}" ] || [ -z "${PREV_FRONTEND_IMAGE}" ]; then
                ROLLBACK_STATUS="unavailable"
              else
                ROLLBACK_STATUS="attempted"

                printf '%s\n' \
                  "BACKEND_IMAGE=${PREV_BACKEND_IMAGE}" \
                  "FRONTEND_IMAGE=${PREV_FRONTEND_IMAGE}" \
                  "DATABASE_URL=${DATABASE_URL}" \
                  "JWT_SECRET=${JWT_SECRET}" \
                  "MAIL_FROM=${MAIL_FROM}" \
                  "APP_BASE_URL=${APP_BASE_URL}" \
                  "SMTP_HOST=${SMTP_HOST}" \
                  "SMTP_PORT=${SMTP_PORT}" \
                  "SMTP_SECURE=${SMTP_SECURE}" \
                  "SMTP_USER=${SMTP_USER}" \
                  "SMTP_PASS=${SMTP_PASS}" \
                  > .env.deploy

                if docker compose -f docker-compose.prod.yml --env-file .env.deploy up -d --wait backend && \
                   docker compose -f docker-compose.prod.yml --env-file .env.deploy up -d --wait frontend && \
                   curl -fsS http://localhost/health >/dev/null && \
                   curl -fsS http://localhost/ >/dev/null; then
                  ROLLBACK_STATUS="success"
                  DEPLOY_STATUS="rolled_back"
                  echo "Rollback succeeded and previous production images are healthy again."
                else
                  ROLLBACK_STATUS="failed"
                  echo "Rollback failed: previous images did not recover healthy service state."
                fi
              fi
            fi

            ACTIVE_BACKEND_IMAGE="$(docker inspect --format='{{.Config.Image}}' kingken-backend 2>/dev/null || true)"
            ACTIVE_FRONTEND_IMAGE="$(docker inspect --format='{{.Config.Image}}' kingken-frontend 2>/dev/null || true)"
            DEPLOY_FINISHED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

            printf '%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\n' \
              "$DEPLOY_FINISHED_AT" \
              "run_id=$RUN_ID" \
              "attempt=$RUN_ATTEMPT" \
              "repo=$REPOSITORY" \
              "actor=$ACTOR" \
              "release_tag=$RELEASE_TAG" \
              "deploy_status=$DEPLOY_STATUS" \
              "rollback_status=$ROLLBACK_STATUS" \
              "failure_reason=$FAILURE_REASON" \
              "backend_image=$ACTIVE_BACKEND_IMAGE" \
              "frontend_image=$ACTIVE_FRONTEND_IMAGE" \
              >> "$DEPLOY_HISTORY_FILE"

            if [ "$ROLLBACK_STATUS" != "not_needed" ]; then
              printf '%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\n' \
                "$DEPLOY_FINISHED_AT" \
                "run_id=$RUN_ID" \
                "attempt=$RUN_ATTEMPT" \
                "release_tag=$RELEASE_TAG" \
                "failure_reason=$FAILURE_REASON" \
                "rollback_status=$ROLLBACK_STATUS" \
                "prev_backend=$PREV_BACKEND_IMAGE" \
                "prev_frontend=$PREV_FRONTEND_IMAGE" \
                "run_url=$RUN_URL" \
                >> "$ROLLBACK_AUDIT_FILE"
            fi

            docker compose -f docker-compose.prod.yml --env-file .env.deploy ps || true

            echo "DEPLOY_STATUS=${DEPLOY_STATUS}"
            echo "ROLLBACK_STATUS=${ROLLBACK_STATUS}"
            echo "FAILURE_REASON=${FAILURE_REASON}"
            echo "PREV_BACKEND_IMAGE=${PREV_BACKEND_IMAGE}"
            echo "PREV_FRONTEND_IMAGE=${PREV_FRONTEND_IMAGE}"
            echo "ACTIVE_BACKEND_IMAGE=${ACTIVE_BACKEND_IMAGE}"
            echo "ACTIVE_FRONTEND_IMAGE=${ACTIVE_FRONTEND_IMAGE}"
            echo "DEPLOY_STARTED_AT=${DEPLOY_STARTED_AT}"
            echo "DEPLOY_FINISHED_AT=${DEPLOY_FINISHED_AT}"
            echo "DEPLOY_HISTORY_FILE=${DEPLOY_HISTORY_FILE}"
            echo "ROLLBACK_AUDIT_FILE=${ROLLBACK_AUDIT_FILE}"

      - name: Parse remote deployment result
        if: ${{ always() && steps.precheck.outputs.ready == 'true' }}
        id: deploy_result
        env:
          REMOTE_STDOUT: ${{ steps.remote_deploy.outputs.stdout }}
          REMOTE_OUTCOME: ${{ steps.remote_deploy.outcome }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          stdout = os.environ.get("REMOTE_STDOUT", "")
          outcome = os.environ.get("REMOTE_OUTCOME", "")
          values = {
              "deploy_status": "unknown",
              "rollback_status": "unknown",
              "failure_reason": "ssh_action_failed" if outcome == "failure" else "unknown",
              "prev_backend_image": "",
              "prev_frontend_image": "",
              "active_backend_image": "",
              "active_frontend_image": "",
              "deploy_started_at": "",
              "deploy_finished_at": "",
              "deploy_history_file": "",
              "rollback_audit_file": "",
          }

          for line in stdout.splitlines():
              if "=" not in line:
                  continue
              key, value = line.split("=", 1)
              key = key.strip()
              value = value.strip()
              mapping = {
                  "DEPLOY_STATUS": "deploy_status",
                  "ROLLBACK_STATUS": "rollback_status",
                  "FAILURE_REASON": "failure_reason",
                  "PREV_BACKEND_IMAGE": "prev_backend_image",
                  "PREV_FRONTEND_IMAGE": "prev_frontend_image",
                  "ACTIVE_BACKEND_IMAGE": "active_backend_image",
                  "ACTIVE_FRONTEND_IMAGE": "active_frontend_image",
                  "DEPLOY_STARTED_AT": "deploy_started_at",
                  "DEPLOY_FINISHED_AT": "deploy_finished_at",
                  "DEPLOY_HISTORY_FILE": "deploy_history_file",
                  "ROLLBACK_AUDIT_FILE": "rollback_audit_file",
              }
              if key in mapping:
                  values[mapping[key]] = value

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as fh:
              for key, value in values.items():
                  fh.write(f"{key}={value}\n")
          PY

      - name: Record deployment success summary
        if: ${{ always() && steps.precheck.outputs.ready == 'true' && steps.deploy_result.outputs.deploy_status == 'success' }}
        run: |
          duration=$(( $(date +%s) - ${{ steps.deploy_start.outputs.epoch }} ))
          {
            echo "## Deployment result"
            echo ""
            echo "- Status: success"
            echo "- Host: ${{ secrets.VPS_HOST }}"
            echo "- Release tag: ${{ needs.build-and-push-images.outputs.release_tag }}"
            echo "- Backend image: ${{ needs.build-and-push-images.outputs.backend_image }}"
            echo "- Frontend image: ${{ needs.build-and-push-images.outputs.frontend_image }}"
            echo "- Health checks: backend and frontend passed"
            echo "- Deploy duration: ${duration}s"
            echo "- Rollback outcome: not needed"
            echo "- Active backend image: ${{ steps.deploy_result.outputs.active_backend_image }}"
            echo "- Active frontend image: ${{ steps.deploy_result.outputs.active_frontend_image }}"
            echo "- Deploy history file: ${{ steps.deploy_result.outputs.deploy_history_file }}"
            echo "- Deploy started at: ${{ steps.deploy_result.outputs.deploy_started_at }}"
            echo "- Deploy finished at: ${{ steps.deploy_result.outputs.deploy_finished_at }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Record deployment failure summary
        if: ${{ always() && steps.precheck.outputs.ready == 'true' && steps.deploy_result.outputs.deploy_status != 'success' }}
        run: |
          duration=$(( $(date +%s) - ${{ steps.deploy_start.outputs.epoch }} ))
          {
            echo "## Deployment result"
            echo ""
            echo "- Status: ${{ steps.deploy_result.outputs.deploy_status }}"
            echo "- Host: ${{ secrets.VPS_HOST }}"
            echo "- Release tag: ${{ needs.build-and-push-images.outputs.release_tag }}"
            echo "- Target backend image: ${{ needs.build-and-push-images.outputs.backend_image }}"
            echo "- Target frontend image: ${{ needs.build-and-push-images.outputs.frontend_image }}"
            echo "- Deploy duration: ${duration}s"
            echo "- Failure reason: ${{ steps.deploy_result.outputs.failure_reason }}"
            echo "- Rollback outcome: ${{ steps.deploy_result.outputs.rollback_status }}"
            echo "- Previous backend image: ${{ steps.deploy_result.outputs.prev_backend_image }}"
            echo "- Previous frontend image: ${{ steps.deploy_result.outputs.prev_frontend_image }}"
            echo "- Active backend image after incident: ${{ steps.deploy_result.outputs.active_backend_image }}"
            echo "- Active frontend image after incident: ${{ steps.deploy_result.outputs.active_frontend_image }}"
            echo "- Deploy history file: ${{ steps.deploy_result.outputs.deploy_history_file }}"
            echo "- Rollback audit file: ${{ steps.deploy_result.outputs.rollback_audit_file }}"
            echo "- Deploy started at: ${{ steps.deploy_result.outputs.deploy_started_at }}"
            echo "- Deploy finished at: ${{ steps.deploy_result.outputs.deploy_finished_at }}"
            echo "- Next step: inspect remote deploy logs and rollback state details"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Generate deployment trace artifact
        if: ${{ always() && steps.precheck.outputs.ready == 'true' }}
        env:
          REMOTE_STDOUT: ${{ steps.remote_deploy.outputs.stdout }}
        run: |
          mkdir -p deployment-trace
          cat > deployment-trace/deployment-report.md <<EOF
          # Deployment Incident Report

          - Repository: ${{ github.repository }}
          - Run ID: ${{ github.run_id }}
          - Run attempt: ${{ github.run_attempt }}
          - Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          - Commit: ${{ github.sha }}
          - Release tag: ${{ needs.build-and-push-images.outputs.release_tag }}
          - Actor: ${{ github.actor }}
          - Host: ${{ secrets.VPS_HOST }}
          - Deploy status: ${{ steps.deploy_result.outputs.deploy_status }}
          - Rollback status: ${{ steps.deploy_result.outputs.rollback_status }}
          - Failure reason: ${{ steps.deploy_result.outputs.failure_reason }}
          - Backend target image: ${{ needs.build-and-push-images.outputs.backend_image }}
          - Frontend target image: ${{ needs.build-and-push-images.outputs.frontend_image }}
          - Active backend image: ${{ steps.deploy_result.outputs.active_backend_image }}
          - Active frontend image: ${{ steps.deploy_result.outputs.active_frontend_image }}
          - Previous backend image: ${{ steps.deploy_result.outputs.prev_backend_image }}
          - Previous frontend image: ${{ steps.deploy_result.outputs.prev_frontend_image }}
          - Deploy started at: ${{ steps.deploy_result.outputs.deploy_started_at }}
          - Deploy finished at: ${{ steps.deploy_result.outputs.deploy_finished_at }}
          - Deploy history file: ${{ steps.deploy_result.outputs.deploy_history_file }}
          - Rollback audit file: ${{ steps.deploy_result.outputs.rollback_audit_file }}
          EOF

          cat > deployment-trace/deployment-report.json <<EOF
          {
            "repository": "${{ github.repository }}",
            "run_id": "${{ github.run_id }}",
            "run_attempt": "${{ github.run_attempt }}",
            "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "commit": "${{ github.sha }}",
            "release_tag": "${{ needs.build-and-push-images.outputs.release_tag }}",
            "actor": "${{ github.actor }}",
            "host": "${{ secrets.VPS_HOST }}",
            "deploy_status": "${{ steps.deploy_result.outputs.deploy_status }}",
            "rollback_status": "${{ steps.deploy_result.outputs.rollback_status }}",
            "failure_reason": "${{ steps.deploy_result.outputs.failure_reason }}",
            "backend_target_image": "${{ needs.build-and-push-images.outputs.backend_image }}",
            "frontend_target_image": "${{ needs.build-and-push-images.outputs.frontend_image }}",
            "active_backend_image": "${{ steps.deploy_result.outputs.active_backend_image }}",
            "active_frontend_image": "${{ steps.deploy_result.outputs.active_frontend_image }}",
            "previous_backend_image": "${{ steps.deploy_result.outputs.prev_backend_image }}",
            "previous_frontend_image": "${{ steps.deploy_result.outputs.prev_frontend_image }}",
            "deploy_started_at": "${{ steps.deploy_result.outputs.deploy_started_at }}",
            "deploy_finished_at": "${{ steps.deploy_result.outputs.deploy_finished_at }}",
            "deploy_history_file": "${{ steps.deploy_result.outputs.deploy_history_file }}",
            "rollback_audit_file": "${{ steps.deploy_result.outputs.rollback_audit_file }}"
          }
          EOF

          printf '%s\n' "$REMOTE_STDOUT" > deployment-trace/remote-deploy-stdout.log

      - name: Upload deployment trace artifact
        if: ${{ always() && steps.precheck.outputs.ready == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: deployment-trace-${{ github.run_id }}-${{ github.run_attempt }}
          path: deployment-trace/
          retention-days: 30

      - name: Enforce deployment outcome
        if: ${{ always() && steps.precheck.outputs.ready == 'true' }}
        run: |
          if [ "${{ steps.remote_deploy.outcome }}" = "failure" ]; then
            echo "::error title=Deploy SSH Execution Failed::Remote deployment command did not complete successfully."
            exit 1
          fi

          if [ "${{ steps.deploy_result.outputs.deploy_status }}" != "success" ]; then
            echo "::error title=Deployment Incident::Deployment status=${{ steps.deploy_result.outputs.deploy_status }}, rollback=${{ steps.deploy_result.outputs.rollback_status }}, reason=${{ steps.deploy_result.outputs.failure_reason }}"
            exit 1
          fi

      - name: Notify on deploy failure
        if: ${{ failure() && steps.precheck.outputs.ready == 'true' }}
        env:
          SHA: ${{ github.sha }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          echo "🚨 Deployment failed for commit ${SHA} on host ${VPS_HOST} (rollback to previous images attempted)" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${SLACK_WEBHOOK_URL}" ]; then
            payload=$(printf '{"text":"🚨 KingKen deploy failed for `%s` on `%s` — rollback to previous images attempted"}' "${SHA}" "${VPS_HOST}")
            curl -sS -X POST -H 'Content-type: application/json' --data "${payload}" "${SLACK_WEBHOOK_URL}" >/dev/null
          fi

      - name: Notify on deploy success
        if: ${{ success() && steps.precheck.outputs.ready == 'true' }}
        env:
          SHA: ${{ github.sha }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          echo "✅ Deployment succeeded for commit ${SHA} on host ${VPS_HOST}" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${SLACK_WEBHOOK_URL}" ]; then
            payload=$(printf '{"text":"✅ KingKen deploy succeeded for `%s` on `%s`"}' "${SHA}" "${VPS_HOST}")
            curl -sS -X POST -H 'Content-type: application/json' --data "${payload}" "${SLACK_WEBHOOK_URL}" >/dev/null
          fi

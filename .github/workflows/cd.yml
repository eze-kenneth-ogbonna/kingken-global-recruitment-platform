name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: cd-main
  cancel-in-progress: true

jobs:
  build-and-push-images:
    name: Build and Push Docker Images
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest

    outputs:
      backend_image: ${{ steps.meta.outputs.backend_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Derive image metadata
        id: meta
        run: |
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          SHA_TAG="${{ github.event.workflow_run.head_sha }}"
          echo "backend_image=ghcr.io/${OWNER_LC}/kingken-backend:${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=ghcr.io/${OWNER_LC}/kingken-frontend:${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "backend_latest=ghcr.io/${OWNER_LC}/kingken-backend:latest" >> "$GITHUB_OUTPUT"
          echo "frontend_latest=ghcr.io/${OWNER_LC}/kingken-frontend:latest" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push backend image
        run: |
          docker build \
            -t "${{ steps.meta.outputs.backend_image }}" \
            -t "${{ steps.meta.outputs.backend_latest }}" \
            ./backend
          docker push "${{ steps.meta.outputs.backend_image }}"
          docker push "${{ steps.meta.outputs.backend_latest }}"

      - name: Build and push frontend image
        run: |
          docker build \
            -t "${{ steps.meta.outputs.frontend_image }}" \
            -t "${{ steps.meta.outputs.frontend_latest }}" \
            ./frontend
          docker push "${{ steps.meta.outputs.frontend_image }}"
          docker push "${{ steps.meta.outputs.frontend_latest }}"

  deploy-vps:
    name: Deploy to VPS
    needs: build-and-push-images
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' && secrets.VPS_HOST != '' && secrets.VPS_USER != '' && secrets.VPS_SSH_KEY != '' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload compose file to server
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "mkdir -p ~/kingken"
          scp ops/docker-compose.prod.yml "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/kingken/docker-compose.prod.yml"

      - name: Zero-downtime deploy with health checks
        env:
          BACKEND_IMAGE: ${{ needs.build-and-push-images.outputs.backend_image }}
          FRONTEND_IMAGE: ${{ needs.build-and-push-images.outputs.frontend_image }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
            set -euo pipefail

            has_cmd() { command -v \"\$1\" >/dev/null 2>&1; }

            check_health() {
              if has_cmd curl; then
                curl -fsS http://127.0.0.1/health >/dev/null
              elif has_cmd wget; then
                wget -q -O /dev/null http://127.0.0.1/health
              else
                echo 'Neither curl nor wget found on VPS for health verification.'
                return 1
              fi
            }

            mkdir -p ~/kingken

            printf '%s\n' \
              "BACKEND_IMAGE=${BACKEND_IMAGE}" \
              "FRONTEND_IMAGE=${FRONTEND_IMAGE}" \
              "DATABASE_URL=${DATABASE_URL}" \
              "JWT_SECRET=${JWT_SECRET}" \
              "MAIL_FROM=${MAIL_FROM}" \
              "APP_BASE_URL=${APP_BASE_URL}" \
              "SMTP_HOST=${SMTP_HOST}" \
              "SMTP_PORT=${SMTP_PORT}" \
              "SMTP_SECURE=${SMTP_SECURE}" \
              "SMTP_USER=${SMTP_USER}" \
              "SMTP_PASS=${SMTP_PASS}" \
              > ~/kingken/.env.deploy

            cd ~/kingken
            echo '${GHCR_TOKEN}' | docker login ghcr.io -u '${GHCR_USER}' --password-stdin

            PREV_BACKEND_IMAGE=\$(docker inspect -f '{{.Config.Image}}' kingken-backend 2>/dev/null || true)
            PREV_FRONTEND_IMAGE=\$(docker inspect -f '{{.Config.Image}}' kingken-frontend 2>/dev/null || true)

            docker compose -f docker-compose.prod.yml --env-file .env.deploy pull

            # docker rollout (if installed) provides start-new, wait-healthy, then switch behavior.
            cp docker-compose.prod.yml compose.yaml
            if docker rollout --help >/dev/null 2>&1; then
              echo 'Using docker rollout for backend and frontend'
              if ! docker rollout backend; then
                echo 'Backend rollout failed. Keeping previous backend image.'
                if [ -n \"\$PREV_BACKEND_IMAGE\" ]; then
                  sed -i \"s|^BACKEND_IMAGE=.*|BACKEND_IMAGE=\$PREV_BACKEND_IMAGE|\" .env.deploy
                  docker compose -f docker-compose.prod.yml --env-file .env.deploy up -d --wait backend
                fi
                exit 1
              fi

              if ! docker rollout frontend; then
                echo 'Frontend rollout failed. Keeping previous frontend image.'
                if [ -n \"\$PREV_FRONTEND_IMAGE\" ]; then
                  sed -i \"s|^FRONTEND_IMAGE=.*|FRONTEND_IMAGE=\$PREV_FRONTEND_IMAGE|\" .env.deploy
                  docker compose -f docker-compose.prod.yml --env-file .env.deploy up -d --wait frontend
                fi
                exit 1
              fi
            else
              echo 'docker rollout not found. Falling back to compose health-gated update.'
              docker compose -f docker-compose.prod.yml --env-file .env.deploy up -d --wait backend
              docker compose -f docker-compose.prod.yml --env-file .env.deploy up -d --wait frontend
            fi

            # End-to-end health verification through frontend -> backend proxy
            check_health

            docker compose -f docker-compose.prod.yml --env-file .env.deploy ps
            docker compose -f docker-compose.prod.yml --env-file .env.deploy logs --tail=50
            docker image prune -f
          "

      - name: Notify on deploy failure
        if: failure()
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          echo "🚨 Deployment failed for commit ${SHA} on host ${VPS_HOST}" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${SLACK_WEBHOOK_URL}" ]; then
            payload=$(printf '{"text":"🚨 KingKen deploy failed for `%s` on `%s`"}' "${SHA}" "${VPS_HOST}")
            curl -sS -X POST -H 'Content-type: application/json' --data "${payload}" "${SLACK_WEBHOOK_URL}" >/dev/null
          fi

      - name: Notify on deploy success
        if: success()
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          echo "✅ Deployment succeeded for commit ${SHA} on host ${VPS_HOST}" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${SLACK_WEBHOOK_URL}" ]; then
            payload=$(printf '{"text":"✅ KingKen deploy succeeded for `%s` on `%s`"}' "${SHA}" "${VPS_HOST}")
            curl -sS -X POST -H 'Content-type: application/json' --data "${payload}" "${SLACK_WEBHOOK_URL}" >/dev/null
          fi

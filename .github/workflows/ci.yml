name: CI Pipeline

on:
  push:
    branches:
      - develop
      - staging
      - 'feature/**'
      - 'fix/**'
      - 'hotfix/**'
      - 'release/**'
  pull_request:
    branches:
      - main
      - staging
      - develop

jobs:
  lint-and-validate:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          find . -name "*.json" -not -path "*/node_modules/*" | while read f; do
            python3 -m json.tool "$f" > /dev/null && echo "✅ $f is valid" || echo "❌ $f is invalid"
          done

      - name: Validate YAML files
        run: |
          pip install pyyaml --quiet
          find . \( -name "*.yml" -o -name "*.yaml" \) | grep -v node_modules | while read f; do
            python3 -c "import yaml; yaml.safe_load(open('$f'))" && echo "✅ $f is valid" || echo "❌ $f is invalid"
          done

      - name: Check for required docs
        run: |
          for file in README.md CONTRIBUTING.md CODE_OF_CONDUCT.md; do
            [ -f "$file" ] && echo "✅ $file exists" || echo "⚠️  $file is missing"
          done

  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint Markdown files
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"
        continue-on-error: true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 0
          format: table

  branch-name-check:
    name: Branch Name Convention Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check branch naming convention
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "Branch name: $BRANCH"
          if echo "$BRANCH" | grep -qE '^(feature|fix|hotfix|release|docs|chore)\/[a-z0-9._-]+$'; then
            echo "✅ Branch name follows convention"
          else
            echo "⚠️  Branch '$BRANCH' does not follow naming convention."
            echo "Expected: feature/*, fix/*, hotfix/*, release/*, docs/*, chore/*"
          fi

  notify:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint-and-validate, markdown-lint, security-scan]
    if: always()
    steps:
      - name: Print CI Summary
        run: |
          echo "================================================"
          echo "  KingKen Global Recruitment Platform - CI Run  "
          echo "================================================"
          echo "  Branch  : ${{ github.ref_name }}"
          echo "  Commit  : ${{ github.sha }}"
          echo "  Trigger : ${{ github.event_name }}"
          echo "  Actor   : ${{ github.actor }}"
          echo "================================================"

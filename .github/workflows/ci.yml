name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-repository:
    name: Validate Repository Structure
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required directories
        run: |
          set -e
          required_dirs=(
            analytics
            api
            automation
            backend
            database
            docs
            frontend
            infrastructure
            integrations
            ops
            security
          )

          for d in "${required_dirs[@]}"; do
            if [[ ! -d "$d" ]]; then
              echo "Missing required directory: $d"
              exit 1
            fi
          done

      - name: Verify required documentation files
        run: |
          set -e
          required_files=(
            README.md
            ARCHITECTURE.md
            DEVELOPMENT.md
            docs/SETUP_GUIDE.md
          )

          for f in "${required_files[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "Missing required file: $f"
              exit 1
            fi
          done

      - name: Validate Markdown readability baseline
        run: |
          set -e
          # Basic guard: prevent empty markdown files in tracked docs.
          empty_files=$(find . -type f -name "*.md" -size 0 | wc -l)
          if [[ "$empty_files" -gt 0 ]]; then
            echo "Found empty markdown files. Please add content before merging."
            find . -type f -name "*.md" -size 0
            exit 1
          fi

  backend-checks:
    name: Backend Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint and typecheck
        run: npm run lint

      - name: Prisma format and validate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kingken_dev?schema=public
        run: |
          npm run prisma:format
          npm run prisma:validate

  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint, typecheck, and build
        run: |
          npm run lint
          npm run typecheck
          npm run build

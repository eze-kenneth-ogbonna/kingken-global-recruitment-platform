name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-repository:
    name: Validate Repository Structure
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify required directories
        run: |
          set -e
          required_dirs=(
            analytics
            api
            automation
            backend
            database
            docs
            frontend
            infrastructure
            integrations
            ops
            security
          )

          for d in "${required_dirs[@]}"; do
            if [[ ! -d "$d" ]]; then
              echo "Missing required directory: $d"
              exit 1
            fi
          done

      - name: Verify required documentation files
        run: |
          set -e
          required_files=(
            README.md
            ARCHITECTURE.md
            DEVELOPMENT.md
            docs/SETUP_GUIDE.md
          )

          for f in "${required_files[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "Missing required file: $f"
              exit 1
            fi
          done

      - name: Validate Markdown readability baseline
        run: |
          set -e
          # Basic guard: prevent empty markdown files in tracked docs.
          empty_files=$(find . -type f -name "*.md" -size 0 | wc -l)
          if [[ "$empty_files" -gt 0 ]]; then
            echo "Found empty markdown files. Please add content before merging."
            find . -type f -name "*.md" -size 0
            exit 1
          fi

  backend-checks:
    name: Backend Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Verify Node.js and npm availability
        run: |
          if ! command -v node &>/dev/null; then
            echo "::error title=Missing Runtime::node not found on PATH after setup-node. Check actions/setup-node version."
            exit 1
          fi
          if ! command -v npm &>/dev/null; then
            echo "::error title=Missing Runtime::npm not found on PATH after setup-node. Check actions/setup-node version."
            exit 1
          fi
          echo "::notice title=Runtime OK::node $(node -v), npm $(npm -v)"
          echo "NODE_BIN=$(dirname $(which node))" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Set DATABASE_URL
        run: echo "DATABASE_URL=file:./dev.db" >> $GITHUB_ENV

      - name: Run backend quality checks (if defined)
        run: |
          npm run --if-present lint
          npm run --if-present typecheck
          npm run --if-present test

      - name: Prisma format and validate
        run: |
          npx prisma format --schema prisma/schema.prisma
          npx prisma validate --schema prisma/schema.prisma

  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Verify Node.js and npm availability
        run: |
          if ! command -v node &>/dev/null; then
            echo "::error title=Missing Runtime::node not found on PATH after setup-node. Check actions/setup-node version."
            exit 1
          fi
          if ! command -v npm &>/dev/null; then
            echo "::error title=Missing Runtime::npm not found on PATH after setup-node. Check actions/setup-node version."
            exit 1
          fi
          echo "::notice title=Runtime OK::node $(node -v), npm $(npm -v)"

      - name: Check lockfile sync
        run: npm ci --dry-run

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run frontend quality checks and build
        run: |
          npm run --if-present lint
          npm run --if-present typecheck
          npm run --if-present test
          npm run build

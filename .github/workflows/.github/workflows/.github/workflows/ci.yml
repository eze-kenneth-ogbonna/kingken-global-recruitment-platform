# KINGKEN GLOBAL PLATFORM

## 🌍 Global Workforce Mobility & Recruitment System

KingKen Global is a digital platform designed to connect skilled workers from Africa to international employers, while providing seamless recruitment, visa processing, and travel coordination services.

---

## 🚀 Overview

The platform enables:

* Job seekers to apply for international opportunities
* Employers to hire verified global talent
* Automated recruitment and deployment workflows
* Real-time tracking of applications, visas, and placements

---

## 🧩 Core Features

### 👤 Worker Portal

* Register and create a profile
* Upload CV and documents
* Apply for jobs
* Track application and visa status

### 🏢 Employer Portal

* Register the company
* Post job openings
* Request workers
* Track recruitment progress

### ⚙️ Admin Dashboard

* Manage workers and employers
* Track recruitment pipeline
* Monitor visa processing
* Control deployments and operations

### 🔄 Automation System

* Auto notifications (WhatsApp / Email)
* Application tracking
* Workflow automation

---

## 🏗️ Project Structure


## 🔧 Development Setup

### 1. Clone Repository

git clone <repository-url>
cd kingken-global-platform

### 2. Install Dependencies

#### Node.js:

npm install

#### Python (if used):

pip install -r requirements.txt

---

### 3. Environment Configuration

Create a `.env` file:

DATABASE_URL=your_database_url
API_KEY=your_api_key
SECRET_KEY=your_secret

---

### 4. Run Application

#### Node.js:

npm start

#### Python:

python app.py

---

### 5. Run Tests

npm test
or
pytest

---

## 🌱 Branching Strategy

This project follows a structured branching system:

* main → Production
* develop → Development
* feature/* → New features
* bugfix/* → Fixes
* hotfix/* → Urgent fixes

See `/docs/branching-strategy.md` for full details.


on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

jobs:
  deploy-check:
    name: Pre-deployment Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Phase 1 MVP — No deployment required
        run: |
          echo "========================================="
          echo "Kingken Global Recruitment Platform"
          echo "Deploy Workflow — Phase 1 MVP"
          echo "========================================="
          echo ""
          echo "Phase 1 is a no-code platform (Google Sheets + Zapier + WATI)."
          echo "No server deployment is required."
          echo ""
          echo "This workflow will be activated in Phase 2 when the"
          echo "React.js + Node.js platform is built."
          echo ""
          echo "Current platform status: MVP v1.0.0"
          echo "Phase 2 target: Q3 2026"
          echo ""
          echo "For setup and go-live instructions, see:"
          echo "  - docs/SETUP_GUIDE.md"
          echo "  - ops/ROLLOUT_CHECKLIST.md"


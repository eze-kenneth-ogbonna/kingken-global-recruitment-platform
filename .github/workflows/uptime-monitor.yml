name: Uptime Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  UPTIME_SLOW_THRESHOLD_MS: 2000

jobs:
  healthcheck:
    name: Check Production Endpoints
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Validate uptime monitor configuration
        id: precheck
        env:
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          OPS_STATUS_URL: ${{ secrets.OPS_STATUS_URL }}
        run: |
          if [ -z "${HEALTHCHECK_URL}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ Uptime monitor skipped: set the HEALTHCHECK_URL secret to enable backend health checks. Optional extras: FRONTEND_URL and OPS_STATUS_URL." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run uptime checks
        id: probe
        if: ${{ steps.precheck.outputs.ready == 'true' }}
        env:
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          OPS_STATUS_URL: ${{ secrets.OPS_STATUS_URL }}
          UPTIME_SLOW_THRESHOLD_MS: ${{ env.UPTIME_SLOW_THRESHOLD_MS }}
        run: |
          set -euo pipefail

          slow_count=0
          total_count=0

          ENDPOINTS=(
            "backend|${HEALTHCHECK_URL}"
          )

          if [ -n "${FRONTEND_URL}" ]; then
            ENDPOINTS+=("frontend|${FRONTEND_URL}")
          fi

          if [ -n "${OPS_STATUS_URL}" ]; then
            ENDPOINTS+=("ops|${OPS_STATUS_URL}")
          fi

          printf '## Uptime checks\n\n' >> "$GITHUB_STEP_SUMMARY"
          printf '| Endpoint | URL | Latency | Status |\n' >> "$GITHUB_STEP_SUMMARY"
          printf '|---|---|---:|---|\n' >> "$GITHUB_STEP_SUMMARY"

          for entry in "${ENDPOINTS[@]}"; do
            name="${entry%%|*}"
            url="${entry#*|}"
            total_count=$((total_count + 1))

            latency_seconds=$(curl --fail --show-error --silent --output /dev/null --write-out '%{time_total}' --max-time 15 --retry 3 --retry-delay 2 "${url}") || {
              printf '| %s | %s | n/a | ❌ Down |\n' "${name}" "${url}" >> "$GITHUB_STEP_SUMMARY"
              echo "failed_endpoint=${name}" >> "$GITHUB_OUTPUT"
              echo "failed_url=${url}" >> "$GITHUB_OUTPUT"
              exit 1
            }

            latency_ms=$(awk "BEGIN { printf \"%d\", (${latency_seconds} * 1000) + 0.5 }")

            if [ "${latency_ms}" -gt "${UPTIME_SLOW_THRESHOLD_MS}" ]; then
              slow_count=$((slow_count + 1))
              printf '| %s | %s | %sms | ⚠️ Slow |\n' "${name}" "${url}" "${latency_ms}" >> "$GITHUB_STEP_SUMMARY"
            else
              printf '| %s | %s | %sms | ✅ Healthy |\n' "${name}" "${url}" "${latency_ms}" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

          echo "slow_count=${slow_count}" >> "$GITHUB_OUTPUT"
          echo "total_count=${total_count}" >> "$GITHUB_OUTPUT"

          if [ "${slow_count}" -gt 0 ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "⚠️ ${slow_count}/${total_count} endpoint(s) are responding slowly (threshold: ${UPTIME_SLOW_THRESHOLD_MS}ms)." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "✅ All ${total_count} configured endpoint(s) are within the healthy latency threshold (${UPTIME_SLOW_THRESHOLD_MS}ms)." >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "status=ok" >> "$GITHUB_OUTPUT"

      - name: Notify Slack on failure
        if: ${{ failure() && steps.precheck.outputs.ready == 'true' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          echo "🚨 Uptime monitor failed for ${{ steps.probe.outputs.failed_endpoint || 'unknown' }} (${{ steps.probe.outputs.failed_url || 'unknown' }})" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${SLACK_WEBHOOK_URL}" ]; then
            payload=$(printf '{"text":"🚨 Uptime check failed: %s (%s)"}' "${{ steps.probe.outputs.failed_endpoint || 'unknown' }}" "${{ steps.probe.outputs.failed_url || 'unknown' }}")
            curl -sS -X POST -H 'Content-type: application/json' --data "${payload}" "${SLACK_WEBHOOK_URL}" >/dev/null
          fi

      - name: Write success summary
        if: ${{ success() && steps.precheck.outputs.ready == 'true' }}
        run: |
          if [ "${{ steps.probe.outputs.slow_count }}" -gt 0 ]; then
            echo "⚠️ All endpoints are up, but some exceeded the latency threshold." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "✅ All configured uptime checks passed with healthy response times." >> "$GITHUB_STEP_SUMMARY"
          fi

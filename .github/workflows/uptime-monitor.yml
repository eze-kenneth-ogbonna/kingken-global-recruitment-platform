name: Uptime Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  UPTIME_SLOW_THRESHOLD_MS: 2000
  UPTIME_DEGRADED_CONSECUTIVE_RUNS: 3

jobs:
  healthcheck:
    name: Check Production Endpoints
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Validate uptime monitor configuration
        id: precheck
        env:
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          OPS_STATUS_URL: ${{ secrets.OPS_STATUS_URL }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [ -z "${HEALTHCHECK_URL}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ Uptime monitor skipped: set the HEALTHCHECK_URL secret to enable backend health checks. Optional extras: FRONTEND_URL and OPS_STATUS_URL." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "${VPS_HOST}" ] && [ -n "${VPS_USER}" ] && [ -n "${VPS_SSH_KEY}" ]; then
            echo "persist_ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "persist_ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Load previous uptime state
        if: ${{ steps.precheck.outputs.ready == 'true' && steps.precheck.outputs.persist_ready == 'true' }}
        id: previous_state
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          capture_stdout: true
          script: |
            set -eu
            if [ -f ~/kingken/deploy-history/latest-uptime.json ]; then
              cat ~/kingken/deploy-history/latest-uptime.json
            else
              echo '{}'
            fi

      - name: Run uptime checks
        id: probe
        if: ${{ steps.precheck.outputs.ready == 'true' }}
        env:
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          OPS_STATUS_URL: ${{ secrets.OPS_STATUS_URL }}
          UPTIME_SLOW_THRESHOLD_MS: ${{ env.UPTIME_SLOW_THRESHOLD_MS }}
        run: |
          set -euo pipefail

          slow_count=0
          total_count=0
          down_count=0
          overall_status="healthy"
          checked_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          failed_endpoint=""
          failed_url=""

          mkdir -p uptime-artifacts

          ENDPOINTS=(
            "backend|${HEALTHCHECK_URL}"
          )

          if [ -n "${FRONTEND_URL}" ]; then
            ENDPOINTS+=("frontend|${FRONTEND_URL}")
          fi

          if [ -n "${OPS_STATUS_URL}" ]; then
            ENDPOINTS+=("ops|${OPS_STATUS_URL}")
          fi

          printf '## Uptime checks\n\n' >> "$GITHUB_STEP_SUMMARY"
          printf '| Endpoint | URL | Latency | Status |\n' >> "$GITHUB_STEP_SUMMARY"
          printf '|---|---|---:|---|\n' >> "$GITHUB_STEP_SUMMARY"
          printf '[' > uptime-artifacts/endpoints.json
          first_entry=true

          for entry in "${ENDPOINTS[@]}"; do
            name="${entry%%|*}"
            url="${entry#*|}"
            total_count=$((total_count + 1))

            latency_seconds=""
            endpoint_status="healthy"
            if ! latency_seconds=$(curl --fail --show-error --silent --output /dev/null --write-out '%{time_total}' --max-time 15 --retry 3 --retry-delay 2 "${url}"); then
              down_count=$((down_count + 1))
              overall_status="down"
              endpoint_status="down"
              latency_ms="null"
              failed_endpoint="${name}"
              failed_url="${url}"
              printf '| %s | %s | n/a | ❌ Down |\n' "${name}" "${url}" >> "$GITHUB_STEP_SUMMARY"
              echo "failed_endpoint=${name}" >> "$GITHUB_OUTPUT"
              echo "failed_url=${url}" >> "$GITHUB_OUTPUT"
            else
              latency_ms=$(awk "BEGIN { printf \"%d\", (${latency_seconds} * 1000) + 0.5 }")
            fi

            if [ "${endpoint_status}" != "down" ] && [ "${latency_ms}" -gt "${UPTIME_SLOW_THRESHOLD_MS}" ]; then
              slow_count=$((slow_count + 1))
              if [ "${overall_status}" != "down" ]; then
                overall_status="degraded"
              fi
              endpoint_status="slow"
              printf '| %s | %s | %sms | ⚠️ Slow |\n' "${name}" "${url}" "${latency_ms}" >> "$GITHUB_STEP_SUMMARY"
            elif [ "${endpoint_status}" = "healthy" ]; then
              printf '| %s | %s | %sms | ✅ Healthy |\n' "${name}" "${url}" "${latency_ms}" >> "$GITHUB_STEP_SUMMARY"
            fi

            if [ "$first_entry" = false ]; then
              printf ',' >> uptime-artifacts/endpoints.json
            fi
            first_entry=false

            if [ "${latency_ms}" = "null" ]; then
              printf '{"name":"%s","url":"%s","latency_ms":null,"status":"%s"}' "${name}" "${url}" "${endpoint_status}" >> uptime-artifacts/endpoints.json
            else
              printf '{"name":"%s","url":"%s","latency_ms":%s,"status":"%s"}' "${name}" "${url}" "${latency_ms}" "${endpoint_status}" >> uptime-artifacts/endpoints.json
            fi
          done

          printf ']' >> uptime-artifacts/endpoints.json

          echo "slow_count=${slow_count}" >> "$GITHUB_OUTPUT"
          echo "total_count=${total_count}" >> "$GITHUB_OUTPUT"
          echo "down_count=${down_count}" >> "$GITHUB_OUTPUT"
          echo "overall_status=${overall_status}" >> "$GITHUB_OUTPUT"

          if [ "${down_count}" -gt 0 ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "❌ ${down_count}/${total_count} endpoint(s) are down." >> "$GITHUB_STEP_SUMMARY"
          elif [ "${slow_count}" -gt 0 ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "⚠️ ${slow_count}/${total_count} endpoint(s) are responding slowly (threshold: ${UPTIME_SLOW_THRESHOLD_MS}ms)." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "✅ All ${total_count} configured endpoint(s) are within the healthy latency threshold (${UPTIME_SLOW_THRESHOLD_MS}ms)." >> "$GITHUB_STEP_SUMMARY"
          fi

          cat > uptime-artifacts/latest-uptime.json <<EOF
          {
            "checked_at": "${checked_at}",
            "overall_status": "${overall_status}",
            "slow_count": ${slow_count},
            "down_count": ${down_count},
            "total_count": ${total_count},
            "threshold_ms": ${UPTIME_SLOW_THRESHOLD_MS},
            "failed_endpoint": "${failed_endpoint}",
            "failed_url": "${failed_url}",
            "run_id": "${{ github.run_id }}",
            "run_attempt": "${{ github.run_attempt }}",
            "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "endpoints": $(cat uptime-artifacts/endpoints.json)
          }
          EOF

          echo "status=ok" >> "$GITHUB_OUTPUT"

          if [ "${down_count}" -gt 0 ]; then
            exit 1
          fi

          - name: Apply degraded alert policy
          if: ${{ always() && steps.precheck.outputs.ready == 'true' }}
          id: policy
          env:
            PREVIOUS_UPTIME_JSON: ${{ steps.previous_state.outputs.stdout }}
            DEGRADED_THRESHOLD: ${{ env.UPTIME_DEGRADED_CONSECUTIVE_RUNS }}
          run: |
            python - <<'PY'
            import json
            import os
            from pathlib import Path

            previous_raw = os.environ.get("PREVIOUS_UPTIME_JSON", "{}").strip() or "{}"
            try:
              previous = json.loads(previous_raw)
              if not isinstance(previous, dict):
                previous = {}
            except json.JSONDecodeError:
              previous = {}

            current_path = Path("uptime-artifacts/latest-uptime.json")
            current = json.loads(current_path.read_text(encoding="utf-8"))

            previous_overall = previous.get("overall_status")
            previous_degraded_streak = int(previous.get("degraded_streak", 0) or 0)
            previous_down_streak = int(previous.get("down_streak", 0) or 0)
            previous_endpoint_streaks = previous.get("endpoint_slow_streaks", {})
            if not isinstance(previous_endpoint_streaks, dict):
              previous_endpoint_streaks = {}

            overall = current.get("overall_status")
            if overall == "degraded":
              degraded_streak = previous_degraded_streak + 1 if previous_overall == "degraded" else 1
              down_streak = 0
            elif overall == "down":
              degraded_streak = 0
              down_streak = previous_down_streak + 1 if previous_overall == "down" else 1
            else:
              degraded_streak = 0
              down_streak = 0

            endpoint_streaks = {}
            for endpoint in current.get("endpoints", []):
              if not isinstance(endpoint, dict):
                continue
              name = str(endpoint.get("name", ""))
              if not name:
                continue
              if endpoint.get("status") == "slow":
                endpoint_streaks[name] = int(previous_endpoint_streaks.get(name, 0) or 0) + 1
              else:
                endpoint_streaks[name] = 0

            threshold = int(os.environ.get("DEGRADED_THRESHOLD", "3"))
            should_alert_degraded = overall == "degraded" and degraded_streak >= threshold and previous_degraded_streak < threshold
            should_alert_recovery = previous_overall in {"degraded", "down"} and overall == "healthy"

            current["degraded_streak"] = degraded_streak
            current["down_streak"] = down_streak
            current["degraded_threshold"] = threshold
            current["previous_overall_status"] = previous_overall
            current["endpoint_slow_streaks"] = endpoint_streaks
            current["should_alert_degraded"] = should_alert_degraded
            current["should_alert_recovery"] = should_alert_recovery

            current_path.write_text(json.dumps(current, indent=2), encoding="utf-8")

            output_path = Path(os.environ["GITHUB_OUTPUT"])
            with output_path.open("a", encoding="utf-8") as fh:
              fh.write(f"degraded_streak={degraded_streak}\n")
              fh.write(f"down_streak={down_streak}\n")
              fh.write(f"threshold={threshold}\n")
              fh.write(f"should_alert_degraded={'true' if should_alert_degraded else 'false'}\n")
              fh.write(f"should_alert_recovery={'true' if should_alert_recovery else 'false'}\n")
              fh.write(f"previous_overall_status={previous_overall or ''}\n")
            PY

          - name: Record degraded alert policy summary
          if: ${{ always() && steps.precheck.outputs.ready == 'true' }}
          run: |
            {
            echo ""
            echo "## Alert policy"
            echo ""
            echo "- Previous overall status: ${{ steps.policy.outputs.previous_overall_status || 'none' }}"
            echo "- Current degraded streak: ${{ steps.policy.outputs.degraded_streak }}"
            echo "- Current down streak: ${{ steps.policy.outputs.down_streak }}"
            echo "- Degraded alert threshold: ${{ steps.policy.outputs.threshold }} consecutive run(s)"
            } >> "$GITHUB_STEP_SUMMARY"

      - name: Ensure uptime artifact exists on failure
        if: ${{ failure() && steps.precheck.outputs.ready == 'true' && steps.probe.conclusion == 'failure' }}
        run: |
          mkdir -p uptime-artifacts
          if [ ! -f uptime-artifacts/latest-uptime.json ]; then
            cat > uptime-artifacts/latest-uptime.json <<EOF
            {
              "checked_at": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
              "overall_status": "down",
              "slow_count": 0,
              "down_count": 1,
              "total_count": 1,
              "threshold_ms": ${UPTIME_SLOW_THRESHOLD_MS},
              "failed_endpoint": "${{ steps.probe.outputs.failed_endpoint || 'unknown' }}",
              "failed_url": "${{ steps.probe.outputs.failed_url || 'unknown' }}",
              "run_id": "${{ github.run_id }}",
              "run_attempt": "${{ github.run_attempt }}",
              "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "endpoints": []
            }
            EOF
          fi

      - name: Persist latest uptime to VPS
        if: ${{ always() && steps.precheck.outputs.ready == 'true' && steps.precheck.outputs.persist_ready == 'true' }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: uptime-artifacts/latest-uptime.json
          target: ~/kingken/deploy-history/
          strip_components: 1

      - name: Upload uptime trace artifact
        if: ${{ always() && steps.precheck.outputs.ready == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: uptime-trace-${{ github.run_id }}-${{ github.run_attempt }}
          path: uptime-artifacts/
          retention-days: 14

      - name: Notify Slack on failure
        if: ${{ failure() && steps.precheck.outputs.ready == 'true' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          echo "🚨 Uptime monitor failed for ${{ steps.probe.outputs.failed_endpoint || 'unknown' }} (${{ steps.probe.outputs.failed_url || 'unknown' }})" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${SLACK_WEBHOOK_URL}" ]; then
            payload=$(printf '{"text":"🚨 Uptime check failed: %s (%s)"}' "${{ steps.probe.outputs.failed_endpoint || 'unknown' }}" "${{ steps.probe.outputs.failed_url || 'unknown' }}")
            curl -sS -X POST -H 'Content-type: application/json' --data "${payload}" "${SLACK_WEBHOOK_URL}" >/dev/null
          fi

      - name: Notify Slack on degraded performance
        if: ${{ success() && steps.precheck.outputs.ready == 'true' && steps.policy.outputs.should_alert_degraded == 'true' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          echo "⚠️ Degraded performance alert triggered after ${{ steps.policy.outputs.degraded_streak }} consecutive slow run(s)." >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${SLACK_WEBHOOK_URL}" ]; then
            payload=$(printf '{"text":"⚠️ KingKen uptime degraded for %s consecutive runs (threshold: %s). Review the uptime dashboard for slow endpoints."}' "${{ steps.policy.outputs.degraded_streak }}" "${{ steps.policy.outputs.threshold }}")
            curl -sS -X POST -H 'Content-type: application/json' --data "${payload}" "${SLACK_WEBHOOK_URL}" >/dev/null
          fi

      - name: Notify Slack on recovery
        if: ${{ success() && steps.precheck.outputs.ready == 'true' && steps.policy.outputs.should_alert_recovery == 'true' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          echo "✅ Uptime recovered to healthy status after prior degraded/down state." >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${SLACK_WEBHOOK_URL}" ]; then
            payload=$(printf '{"text":"✅ KingKen uptime recovered to healthy status after a degraded/down period."}')
            curl -sS -X POST -H 'Content-type: application/json' --data "${payload}" "${SLACK_WEBHOOK_URL}" >/dev/null
          fi

      - name: Write success summary
        if: ${{ success() && steps.precheck.outputs.ready == 'true' }}
        run: |
          if [ "${{ steps.probe.outputs.slow_count }}" -gt 0 ]; then
            echo "⚠️ All endpoints are up, but some exceeded the latency threshold." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "✅ All configured uptime checks passed with healthy response times." >> "$GITHUB_STEP_SUMMARY"
          fi

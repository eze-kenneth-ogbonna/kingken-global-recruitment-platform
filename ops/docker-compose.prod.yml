services:
  backend:
    image: ${BACKEND_IMAGE}
    container_name: kingken-backend
    restart: unless-stopped
    env_file:
      - .env.deploy
    environment:
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      OPS_STATUS_FILE: /app/ops/latest-status.json
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 15s
    volumes:
      - kingken_data:/app/data
      - kingken_uploads:/app/uploads
      - ./deploy-history:/app/ops:ro

  frontend:
    image: ${FRONTEND_IMAGE}
    container_name: kingken-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s
    ports:
      - "80:80"

volumes:
  kingken_data:
  kingken_uploads:
